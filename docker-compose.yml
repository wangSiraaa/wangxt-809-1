version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "19109:19109"
    environment:
      - NODE_ENV=production
      - PORT=19109
      - JWT_SECRET=procurement-sourcing-secret-key
      - DB_PATH=/app/data/procurement.db
    volumes:
      - ./backend/data:/app/data
    command: sh -c "npm run seed && npm start"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "20109:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
